<!doctype html>
<html lang="vi">
  <head>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch(e) {}
        try {
          var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
          if (!standalone) document.documentElement.setAttribute('data-hide-splash', '1');
        } catch(e) {}
      })();
    </script>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        /* Bắt đầu bằng ĐÚNG màu phẳng của splash hệ điều hành (background_color trong
           manifest) — để lúc chuyển giao không bị giật màu. Gradient sẽ "nở" ra sau. */
        background: #0891b2;
        transition: opacity 0.4s ease;
        overflow: hidden;
      }
      #app-splash::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(160deg, #00c9a7 0%, #0891b2 100%);
        opacity: 0;
        animation: app-splash-bloom 0.7s ease-out 0.1s forwards;
      }
      @keyframes app-splash-bloom {
        to { opacity: 1; }
      }
      #app-splash img {
        position: relative;
        z-index: 1;
        width: 220px;
        height: 220px;
        filter: drop-shadow(0 6px 18px rgba(0,0,0,0.25));
        /* Đứng yên 0.5s đầu (giống hệt icon tĩnh của splash hệ điều hành), sau đó mới bắt đầu nhấp nháy */
        animation: app-splash-pulse 2.2s ease-in-out 0.5s infinite;
      }
      @keyframes app-splash-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.06); }
      }
      #app-splash .app-splash-name {
        position: relative;
        z-index: 1;
        margin-top: 20px;
        color: #fff;
        font-family: 'Baloo 2', 'Plus Jakarta Sans', -apple-system, sans-serif;
        font-size: 19px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      #app-splash .app-splash-name span {
        display: inline-block;
        opacity: 0;
        animation: app-splash-letter 0.35s ease-out forwards;
      }
      @keyframes app-splash-letter {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      #app-splash .app-splash-tag {
        position: relative;
        z-index: 1;
        margin-top: 6px;
        color: rgba(255,255,255,0.8);
        font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
        font-size: 12px;
        opacity: 0;
        animation: app-splash-fade 0.6s ease-out 1.15s forwards;
      }
      @keyframes app-splash-fade {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      #app-splash .app-splash-dots {
        position: relative;
        z-index: 1;
        margin-top: 30px;
        display: flex;
        gap: 6px;
      }
      #app-splash .app-splash-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #fff;
        animation: app-splash-dot 1.2s ease-in-out infinite;
      }
      #app-splash .app-splash-dots span:nth-child(2) { animation-delay: 0.15s; }
      #app-splash .app-splash-dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes app-splash-dot {
        0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
        40% { opacity: 1; transform: translateY(-4px); }
      }
    </style>
