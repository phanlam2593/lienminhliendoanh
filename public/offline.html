<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Không có mạng · Liên Minh Liên Doanh</title>
    <meta name="theme-color" content="#0891b2" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(160deg, #ecfeff 0%, #ffffff 60%);
        color: #0f172a;
        display: flex; align-items: center; justify-content: center;
        padding: 24px;
      }
      .card {
        max-width: 380px; width: 100%; text-align: center;
        background: #fff; border: 1px solid rgba(8,145,178,0.15);
        border-radius: 20px; padding: 32px 24px;
        box-shadow: 0 12px 40px rgba(8,145,178,0.12);
      }
      .badge {
        width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 16px;
        background: linear-gradient(135deg, #00c9a7, #0891b2);
        display: grid; place-items: center; color: #fff;
      }
      h1 { font-size: 20px; margin: 8px 0 6px; font-weight: 800; color: #0891b2; }
      p { font-size: 14px; color: #475569; line-height: 1.55; margin: 0 0 20px; }
      button {
        border: 0; cursor: pointer; font-weight: 700; font-size: 14px;
        padding: 12px 20px; border-radius: 12px;
        background: linear-gradient(135deg, #00c9a7, #0891b2);
        color: #fff; width: 100%;
        box-shadow: 0 6px 16px rgba(8,145,178,0.35);
      }
      button:active { transform: scale(0.98); }
      .hint { margin-top: 12px; font-size: 12px; color: #64748b; }
      @media (prefers-color-scheme: dark) {
        body { background: #0f172a; color: #f1f5f9; }
        .card { background: #1e293b; border-color: rgba(8,145,178,0.3); }
        p { color: #cbd5e1; }
        .hint { color: #94a3b8; }
      }
      html.dark body { background: #0f172a; color: #f1f5f9; }
      html.dark .card { background: #1e293b; border-color: rgba(8,145,178,0.3); }
      html.dark p { color: #cbd5e1; }
      html.dark .hint { color: #94a3b8; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">
        <svg
          width="32"
          height="32"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M1 1l22 22" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <line x1="12" y1="20" x2="12.01" y2="20" />
        </svg>
      </div>
      <h1>Bạn đang ngoại tuyến</h1>
      <p>
        Không có kết nối mạng. Một số nội dung đã xem gần đây vẫn có thể truy cập được. Vui lòng kiểm tra Wi-Fi hoặc dữ
        liệu di động rồi thử lại.
      </p>
      <button onclick="location.reload()">Thử lại</button>
      <div class="hint">Liên Minh Liên Doanh · Cảm ơn bạn đã là một phần của cộng đồng 🌿</div>
    </main>
    <script>
      function tryReconnect() {
        if (!navigator.onLine) return;
        // Thử fetch thật để chắc chắn có mạng, tránh navigator.onLine báo sai
        fetch(location.origin + "/?_check=" + Date.now(), { cache: "no-store", mode: "no-cors" })
          .then(() => location.reload())
          .catch(() => {});
      }

      // Bắt sự kiện chuyển từ offline -> online (giữ nguyên như cũ)
      window.addEventListener("online", tryReconnect);

      // Bắt khi app được mở lại từ nền (quan trọng nhất cho PWA/app đã cài)
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") tryReconnect();
      });
      window.addEventListener("pageshow", tryReconnect);
      window.addEventListener("focus", tryReconnect);

      // Dự phòng: tự kiểm tra định kỳ mỗi 5 giây trong lúc đang hiển thị màn offline
      setInterval(tryReconnect, 5000);
    </script>
  </body>
</html>
